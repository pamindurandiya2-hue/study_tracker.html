<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pamindu's Core Ultimate LMS v8</title>

<style>
/* ===== EXISTING STYLE UNTOUCHED ===== */
:root {
    --bg-cyber:#040408;
    --panel-neon:#090a14;
    --neon-blue:#00f0ff;
    --neon-amber:#ffaa00;
    --neon-purple:#bd00ff;
    --neon-red:#ff0055;
    --neon-green:#00ff66;
    --text-cyber:#f1f5f9;
}

body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: radial-gradient(circle at top,#0c0f24,#040408);
    color: var(--text-cyber);
    margin:0;
    padding:20px;
}

/* ===== NEW FEATURES UI ===== */

.streak-box, .notes-box, .goal-box, .planner-box {
    background:#05060b;
    border:1px solid rgba(255,255,255,0.08);
    padding:15px;
    border-radius:12px;
    margin-top:15px;
}

.streak {
    font-size:2rem;
    color:var(--neon-green);
    font-weight:bold;
}

.small-btn {
    padding:8px;
    border:none;
    cursor:pointer;
    border-radius:6px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<!-- ===== YOUR ORIGINAL HEADER (UNCHANGED) ===== -->
<div class="cyber-header">
    <h2>PAMINDU CORE LMS (UPGRADED)</h2>
</div>

<!-- ================= NEW MODULES ADDED ================= -->

<div class="panel">
    <h3>🔥 STUDY STREAK SYSTEM</h3>
    <div class="streak-box">
        <div class="streak" id="streakCount">0 Days</div>
        <button class="small-btn" onclick="markStudy()">Mark Today Study</button>
    </div>
</div>

<div class="panel">
    <h3>📚 NOTES VAULT</h3>
    <div class="notes-box">
        <select id="noteSub">
            <option>BS</option>
            <option>ACC</option>
            <option>ICT</option>
        </select>
        <textarea id="noteText" placeholder="Write notes..."></textarea>
        <button class="small-btn" onclick="saveNote()">Save Note</button>

        <div id="notesList"></div>
    </div>
</div>

<div class="panel">
    <h3>🎯 DAILY GOAL SYSTEM</h3>
    <div class="goal-box">
        <p id="goalText">Loading...</p>
    </div>
</div>

<div class="panel">
    <h3>📅 SMART PLANNER</h3>
    <div class="planner-box">
        <button class="small-btn" onclick="generatePlan()">Generate Plan</button>
        <div id="planOutput"></div>
    </div>
</div>

</div>

<script>

/* ===== EXISTING DB EXTENDED ONLY ===== */

let db = JSON.parse(localStorage.getItem("paminduLMS_v6")) || {
    BS:0,ACC:0,ICT:0,
    allTimeBS:0,allTimeACC:0,allTimeICT:0,
    tasks:[],
    scoresHistory:[],
    streak:0,
    lastStudyDate:null,
    notes:[]
};

function saveDB(){
    localStorage.setItem("paminduLMS_v6",JSON.stringify(db));
}

/* ================= STREAK SYSTEM ================= */

function markStudy(){
    let today = new Date().toDateString();

    if(db.lastStudyDate !== today){
        if(db.lastStudyDate === new Date(Date.now()-86400000).toDateString()){
            db.streak++;
        } else {
            db.streak = 1;
        }
        db.lastStudyDate = today;
        saveDB();
        updateUI();
    }
}

function updateStreak(){
    document.getElementById("streakCount").innerText = db.streak + " Days 🔥";
}

/* ================= NOTES ================= */

function saveNote(){
    let sub = document.getElementById("noteSub").value;
    let txt = document.getElementById("noteText").value;

    if(txt.trim()=="") return;

    db.notes.push({sub,txt});
    document.getElementById("noteText").value="";
    saveDB();
    renderNotes();
}

function renderNotes(){
    let box = document.getElementById("notesList");
    box.innerHTML="";

    db.notes.forEach(n=>{
        let div = document.createElement("div");
        div.innerHTML = `<b>${n.sub}</b>: ${n.txt}`;
        box.appendChild(div);
    });
}

/* ================= GOALS ================= */

function updateGoals(){
    let remaining = {
        BS:100-db.allTimeBS,
        ACC:100-db.allTimeACC,
        ICT:100-db.allTimeICT
    };

    document.getElementById("goalText").innerHTML =
    `BS: ${remaining.BS}h left<br>
     ACC: ${remaining.ACC}h left<br>
     ICT: ${remaining.ICT}h left`;
}

/* ================= SMART PLANNER ================= */

function generatePlan(){
    let days = 60;
    let plan =
    `📅 60 Day Crash Plan<br>
    BS: ${(100-db.allTimeBS)/days}h/day<br>
    ACC: ${(100-db.allTimeACC)/days}h/day<br>
    ICT: ${(100-db.allTimeICT)/days}h/day`;

    document.getElementById("planOutput").innerHTML = plan;
}

/* ================= ORIGINAL updateUI HOOK ================= */

function updateUI(){
    updateStreak();
    renderNotes();
    updateGoals();
}

/* init */
window.onload = ()=>{
    updateUI();
}

</script>

</body>
</html>
