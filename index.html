<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pamindu's Core StudySync LAB v7.1</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap');

:root {
    --bg: #05060a;
    --glass: rgba(255,255,255,0.06);
    --glass-strong: rgba(255,255,255,0.1);

    --blue: #00e5ff;
    --purple: #b400ff;
    --green: #00ff88;
    --orange: #ffb300;
    --red: #ff2e63;

    --text: #e6f1ff;
}

* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: radial-gradient(circle at top, #0a0f1f, #05060a);
    color: var(--text);
    overflow-x:hidden;
}

/* animated background grid */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:50px 50px;
    z-index:-1;
    animation: moveGrid 20s linear infinite;
}

@keyframes moveGrid {
    from {transform:translateY(0);}
    to {transform:translateY(50px);}
}

.container {
    max-width:1400px;
    margin:auto;
    padding:20px;
}

/* HEADER */
.cyber-header {
    background: var(--glass);
    backdrop-filter: blur(15px);
    border:1px solid rgba(0,229,255,0.2);
    border-radius:20px;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 0 25px rgba(0,229,255,0.1);
}

.cyber-header h1 {
    font-family:'Orbitron', sans-serif;
    letter-spacing:2px;
    color:var(--blue);
    text-shadow:0 0 15px var(--blue);
}

.live-clock {
    padding:10px 15px;
    border-radius:12px;
    background: rgba(0,0,0,0.3);
    border:1px solid rgba(0,229,255,0.3);
    text-align:right;
}

/* PANELS */
.panel {
    background: var(--glass);
    backdrop-filter: blur(12px);
    border-radius:18px;
    padding:20px;
    margin-top:20px;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.3s;
}

.panel:hover {
    transform:translateY(-3px);
    box-shadow:0 0 25px rgba(0,229,255,0.15);
}

/* SUBJECT CARDS */
.sub-card {
    background: var(--glass);
    border-radius:16px;
    padding:18px;
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

.sub-card:hover {
    transform:scale(1.03);
}

/* COLORS */
.bg-bs { border-left:4px solid var(--blue); }
.bg-acc { border-left:4px solid var(--orange); }
.bg-ict { border-left:4px solid var(--purple); }

/* BUTTONS */
button {
    cursor:pointer;
    border:none;
    border-radius:10px;
    padding:12px;
    font-weight:bold;
    transition:0.3s;
}

button:hover {
    transform:scale(1.05);
}

/* PRIMARY BUTTON */
.btn-primary {
    background: linear-gradient(90deg, var(--blue), var(--purple));
    color:#000;
}

/* TASKS */
.task-item {
    display:flex;
    justify-content:space-between;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    background: rgba(0,0,0,0.3);
    border-left:3px solid var(--blue);
}

.task-item.completed {
    opacity:0.4;
    text-decoration:line-through;
}

/* TIMER OVERLAY */
.overlay {
    position:fixed;
    inset:0;
    background: rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* CHART BAR */
.chart-bar {
    height:10px;
    border-radius:10px;
}

/* AI BOX */
.ai-chat-container {
    background: rgba(0,0,0,0.3);
    border-radius:12px;
    padding:10px;
    border:1px solid rgba(0,229,255,0.2);
}

/* SCROLLBAR */
::-webkit-scrollbar {
    width:6px;
}
::-webkit-scrollbar-thumb {
    background: var(--blue);
    border-radius:10px;
}

/* MOBILE */
@media(max-width:768px){
    .cyber-header {
        flex-direction:column;
        text-align:center;
        gap:10px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="cyber-header">
        <div>
            <h1>PAMINDU'S CORE STUDYSYNC LAB</h1>
            <div style="color:var(--blue); font-size:0.9rem; font-weight:bold;">
                ⚡ G.C.E. ADVANCED LEVEL SYSTEM
            </div>
        </div>

        <div class="live-clock">
            <div id="live-date">--/--/----</div>
            <div id="live-time" style="color:var(--blue); font-size:1.2rem;">00:00:00</div>
        </div>
    </div>

    <!-- COUNTDOWN -->
    <div class="panel">
        <div style="text-align:center;">
            <h3 style="color:var(--purple);">⏱️ NEXT EXAM COUNTDOWN</h3>
            <div id="target-exam-name"></div>
            <div id="exam-countdown-val" style="font-size:1.5rem; font-weight:bold; color:var(--green);"></div>
        </div>
    </div>

    <!-- SUBJECT CARDS -->
    <div class="panel">
        <div class="subject-row">

            <div class="sub-card bg-bs">
                <h3>Business Studies</h3>
                <div id="today-hours-bs">0h</div>
                <div id="hours-bs">0h</div>
                <div id="month-hours-bs">0h</div>
            </div>

            <div class="sub-card bg-acc">
                <h3>Accounting</h3>
                <div id="today-hours-acc">0h</div>
                <div id="hours-acc">0h</div>
                <div id="month-hours-acc">0h</div>
            </div>

            <div class="sub-card bg-ict">
                <h3>ICT</h3>
                <div id="today-hours-ict">0h</div>
                <div id="hours-ict">0h</div>
                <div id="month-hours-ict">0h</div>
            </div>

        </div>
    </div>

    <!-- TASKS -->
    <div class="panel">
        <h3 style="color:var(--orange);">📅 TASK LIST</h3>
        <div id="task-list-box"></div>

        <input type="text" id="new-task-text" placeholder="New task...">
        <input type="date" id="new-task-date">
        <button class="btn-primary" onclick="addAdHocTask()">Add Task</button>
    </div>

    <!-- TIMER -->
    <div class="panel">
        <h3 style="color:var(--red);">⏱️ PRACTICE TIMER</h3>

        <select id="timer-subject">
            <option value="None">General</option>
            <option value="BS">BS</option>
            <option value="ACC">ACC</option>
            <option value="ICT">ICT</option>
        </select>

        <input type="number" id="timer-duration" placeholder="Minutes">
        <button onclick="startPaperTimer()" style="background:var(--red); color:#fff;">START FOCUS</button>
    </div>

    <!-- MANUAL LOG -->
    <div class="panel">
        <h3>➕ LOG HOURS</h3>

        <select id="log-subject">
            <option value="BS">BS</option>
            <option value="ACC">ACC</option>
            <option value="ICT">ICT</option>
        </select>

        <input type="number" id="log-amount" placeholder="Hours">
        <button class="btn-primary" onclick="addManualHours()">SAVE</button>
    </div>

</div>
